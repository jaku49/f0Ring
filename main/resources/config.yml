# ==================================================
#                  f0Ring Configuration
# ==================================================
# Full example configuration (complete)
# Clean layout, categorized, ready for production
# ==================================================

updater:
  enabled: true
  url: "https://raw.githubusercontent.com/jaku49/f0Ring/refs/heads/main/main/version.txt"


# ==================================================
# GUI SETTINGS
# ==================================================
gui:
  title: "&#55FF55&lSelect Your Ringo"
  border-material: GRAY_STAINED_GLASS_PANE

  remove-button:
    slot: 49
    material: BARRIER
    name: "&#FF3333&lRemove Ringo"
    lore:
      - "&7Click to remove your current ring."

  lore-has-permission:
    - "&8&m------------------------"
    - ""
    - "&7Shape: &#FFCC00{shape}"
    - ""
    - "&#33FF33✔ Available"
    - "&7Click to equip."
    - ""
    - "&8&m------------------------"

  lore-no-permission:
    - "&8&m------------------------"
    - ""
    - "&7Shape: &#FFCC00{shape}"
    - ""
    - "&#FF3333✖ Locked"
    - "&7Available in store."
    - ""
    - "&8&m------------------------"


# ==================================================
# MESSAGES
# ==================================================
messages:
  only-players: "&#FF3333✖ This command is only available for players."
  usage: "&#FFCC00ℹ Usage: &f/f0ring <reload|alloff>"
  no-permission: "&#FF3333✖ You don't have permission for this ringo."
  no-permission-command: "&#FF3333✖ Missing admin permission (f0ring.admin)."
  ring-equipped: "&#33FF33✔ Ringo equipped successfully."
  ring-removed: "&#FFCC00ℹ Ringo removed."
  reload-success: "&#33FF33✔ Configuration reloaded."
  alloff-success: "&#FFCC00ℹ All effects disabled."
  update-available: |-
    &#FF3333[f0Ring] &fNew version available: &#33FF33{version}
    &fDownload: &#FFCC00{link}


